<hive-tags-panel />
<div class="carousels-container">
  <hive-carousel carouselTitle="Popular tracks" [isLoading]="isLoading()" [isEmpty]="false">
    @for (popularTrack of popularTracks(); track popularTrack.id) {
      <hive-track-card [track]="popularTrack" />
    }
  </hive-carousel>
  <hive-carousel carouselTitle="New releases" />
  <hive-carousel carouselTitle="New albums" />
</div>

<div class="header-container">
  <button routerLink="/" class="header-logo-button">H<span class="header-app-name">ive</span></button>
  @if (!isSign()) {
    <div class="header-search-field">
      <input
        class="header-search-input"
        type="text"
        name="Search"
        placeholder="Find a song and more..."
        [(ngModel)]="searchInput"
      />
      @if (searchInput) {
        <button matIconButton class="clear-button" aria-label="Clear" (click)="searchInput = ''">
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>
    @if (authService.isAuthenticated()) {
      <button matIconButton="tonal" aria-label="User menu button" (click)="openPopup()">
        <mat-icon>person</mat-icon>
      </button>
    } @else {
      <div class="header-buttons-container">
        <button matIconButton aria-label="Menu button" (click)="openPopup()">
          <mat-icon>more_vert</mat-icon>
        </button>
        <button routerLink="/sign" matButton="filled" aria-label="Sign In button">Sign In</button>
      </div>
    }
  }
</div>
<hive-popup [(open)]="isPopupOpened" [userStatus]="authService.isAuthenticated()" (signOut)="signOut()" />
